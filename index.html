<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Official landing page for Neverness to Everness (NTE) - the ultimate supernatural urban open-world RPG with sports cars and Esper combat. Pre-register now!">
    <meta name="keywords" content="Neverness to Everness, NTE, RPG, Anime, Open World, Esper Combat, Perfect World, Hotta Studio, Pre-registration">
    <meta name="author" content="Perfect World Games">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Neverness to Everness (NTE) - Pre-Register Now">
    <meta property="og:description" content="Dive into Hethereau, the supernatural urban metropolis. Custom sports cars, Esper abilities, and anomalies await.">
    <meta property="og:image" content="image1.jpeg">
    <meta property="og:type" content="website">
    
    <title>Neverness to Everness (NTE) | Official PC Lander</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS Link -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Viewport Container (Locked, Non-Scrollable) -->
    <div class="lander-container" id="main-container">
        
        <!-- Live Particle Canvas Background -->
        <canvas id="grid-canvas"></canvas>
        
        <!-- CRT Dynamic Scanline Overlay & Dark Vignette -->
        <div class="scanlines"></div>
        <div class="vignette"></div>
        <div class="glow-overlay"></div>

        <!-- Ambient Background Image -->
        <div class="bg-wrapper">
            <img src="image1.jpeg" alt="Neverness to Everness Background Landscape" class="bg-image" id="bg-img">
        </div>

        <!-- Top Header Navigation & Logo -->
        <header class="main-header">
            <!-- Left Side Logo -->
            <div class="logo-container">
                <a href="#" class="logo-link" id="logo-link-btn" aria-label="Neverness to Everness Home">
                    <img src="logo.png" alt="Neverness to Everness Logo" class="logo-img" id="logo-img">
                </a>
            </div>
            
            <!-- Right Side Utility Controls & Audio Toggle -->
            <div class="utility-controls">
                <button class="audio-toggle-btn" id="audio-toggle" aria-label="Toggle Sound Effects">
                    <span class="audio-icon pulse-icon">🔊</span>
                    <span class="audio-text">SFX ON</span>
                </button>
            </div>
        </header>



        <!-- Cyber HUD Elements for Premium Gamer Feel -->


        <div class="hud-right" id="hud-clock-info">
            <div class="hud-block text-right">
                <div class="hud-label">LOCAL REAL-TIME</div>
                <div class="hud-value font-orbitron" id="hud-clock">00:00:00</div>
            </div>
            <div class="hud-block text-right">
                <div class="hud-label">PRE-REGISTRATION TOTAL</div>
                <div class="hud-value text-glow-pink font-orbitron" id="registration-count">8,531,942</div>
            </div>
        </div>

        <!-- Main Body Display Box (Supernatural Theme Content) -->
        <main class="lander-main-content">
            <!-- Cinematic Trailer Ads Popup / Card -->
            <div class="cinematic-popup-wrapper" id="trailer-popup-wrapper">
                <!-- Headline Above Popup -->
                <h2 class="popup-headline">What If <span class="text-red-gta">GTA</span> Was Anime</h2>
                
                <div class="popup-container-hud">
                    <!-- Corner Brackets -->
                    <span class="popup-bracket-tl"></span>
                    <span class="popup-bracket-tr"></span>
                    <span class="popup-bracket-bl"></span>
                    <span class="popup-bracket-br"></span>
                    
                    <!-- Clickable Video Container (Responsive Media Resolution Split) -->
                    <div class="popup-video-container" id="popup-video-link">
                        <!-- Close button -->
                        <button class="popup-close-btn" id="popup-close" aria-label="Close Popup">✕</button>
                        
                        <video autoplay loop muted playsinline class="popup-video" id="popup-vid" poster="image1.jpeg">
                            <source src="Vidntee.mp4" type="video/mp4">
                            <source src="vidnte.webm" type="video/webm">
                            <source src="https://embed-ssl.wistia.com/deliveries/7469a0b4d28297ea8a23ea2941fdc114.mp4" type="video/mp4">
                        </video>
                        <div class="video-overlay-click"></div>
                    </div>
                    
                    <!-- Popup Controls & Details Bar -->
                    <div class="popup-controls-bar">
                        <!-- Sound Toggle -->
                        <button class="popup-sound-btn" id="popup-sound-toggle">
                            <span class="sound-icon">🔇</span> <span class="sound-text">Enable Sound</span>
                        </button>
                        
                        <!-- CTA Play Free On PC Button -->
                        <div class="popup-cta-wrapper">
                            <a href="https://to.dordir.com/5A0I/2J2B7/" target="_blank" class="popup-cta-btn ctr-btn-custom popup-pink-glow" id="popup-cta">
                                <span class="ctr-text-main font-orbitron" data-text="PLAY FREE ON PC">PLAY FREE ON PC</span>
                                <span class="ctr-sub-text">WINDOWS ONLY</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Lower Section (Footer Container with Black CTR Button & Socials) -->
        <footer class="main-footer">
            <div class="footer-bg-black"></div>
            
            <div class="footer-grid">
                <!-- Platform icons / ratings -->
                <div class="footer-left">

                    <div class="game-rating">
                        <span class="rating-badge">16+</span>
                        <span class="copyright-info">© Hotta Studio. All Rights Reserved. published by Perfect World Games.</span>
                    </div>
                </div>
                
                <!-- Centered Lower Glowing CTR Button -->
                <div class="footer-ctr-center">
                    <div class="ctr-bottom-wrapper">
                        <a href="https://to.dordir.com/5A0I/2J2B7/" target="_blank" class="ctr-btn-custom ctr-glow-custom" id="ctr-bottom" aria-label="Bottom Glowing Play On PC Button">
                            <span class="ctr-bracket-tl"></span>
                            <span class="ctr-bracket-tr"></span>
                            <span class="ctr-bracket-bl"></span>
                            <span class="ctr-bracket-br"></span>
                            <div class="ctr-glitch-overlay-custom"></div>
                            <span class="ctr-text-main font-orbitron" data-text="PLAY ON PC">PLAY ON PC</span>
                            <span class="ctr-sub-text">WINDOWS ONLY</span>
                        </a>
                    </div>
                </div>



                <!-- Right-side Social Icons & Copyright -->
                <div class="footer-right">
                    <a href="https://to.dordir.com/5A0I/2J2B7/" target="_blank" class="footer-banner-link" aria-label="NTE 04/29 Official Launch Details">
                        <img src="nav_transparent.png" alt="Neverness to Everness 04/29 Official Launch Banner" class="footer-banner-img">
                    </a>
                </div>
            </div>
        </footer>

    </div>

    <!-- Custom JavaScript Link -->
    <script src="script.js"></script>
</body>
</html>
